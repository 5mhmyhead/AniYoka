name: aniyoka
description: a flutter project for mobile development.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  stacked: ^3.4.0
  stacked_services: ^1.1.0
  graphql_flutter: ^5.3.0
  google_fonts: ^8.1.0
  palette_generator: ^0.3.3
  cached_network_image: ^3.3.1
  shared_preferences: ^2.3.0
  font_awesome_flutter: '>= 4.7.0'
  url_launcher: ^6.3.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F45C82"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 17

dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.1
  stacked_generator: ^2.0.4
  golden_toolkit: ^0.15.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
  - assets/images/logo.png
  - assets/images/posters.png
